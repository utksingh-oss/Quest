<div class="quest-card" [ngClass]="quest.status">

  <div class="quest-header">
    <div class="quest-info" [style.background-image]="questBackgroundImage">
      <span class="quest-status">{{ quest.status }}</span>
      <h3 class="quest-title">{{ quest.title }}</h3>
      <p class="quest-detail">{{ quest.description }}</p>
    </div>
  </div>

  <div class="quest-progress">
    <div class="progress-label">
      <span>Progress</span>
      <span>{{ completedTasks }} / {{ totalTasks }}</span>
    </div>

    <div class="progress-bar">
      <div 
        class="progress-fill"
        [style.width.%]="progressPercent">
      </div>
    </div>
  </div>

  <div class="quest-rewards">
    <span>⭐ {{ quest.completionBonus.xp }}</span>
    <span>🪙 {{ quest.completionBonus.gold }}</span>
  </div>

  <button class="quest-btn">
    {{ getButtonLabel(quest.status) }}
  </button>

</div>
