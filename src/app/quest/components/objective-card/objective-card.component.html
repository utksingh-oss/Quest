<ion-card
  class="objective-card-compact"
  [ngClass]="[
    objective.difficulty,
    objective.isCompleted ? 'completed' : ''
  ]">

  <!-- Header Row -->
  <div class="objective-row">

    <div class="left">

      <span class="difficulty-tag">
        {{ objective.difficulty | uppercase }}
      </span>

      <div class="title">
        {{ objective.title }}
      </div>

    </div>

    <!-- Circular Checkbox -->
    <ion-checkbox
      class="complete-checkbox"
      [checked]="objective.isCompleted"
      (ionChange)="onComplete($event)">
    </ion-checkbox>

  </div>

  @if(showRewardPop) {
    <div class="reward-pop">
      +{{ objective.rewards.xp }} XP
      +{{ objective.rewards.gold }} Gold
    </div>
  }

  <!-- Meta Row -->
  <div class="meta-row">

    <div class="time">
      ⏱ {{ objective.durationMinutes }}
    </div>

    <div class="rewards">

      ⭐ +{{ objective.rewards.xp }}

      💰 +{{ objective.rewards.gold }}

    </div>

  </div>

</ion-card>
