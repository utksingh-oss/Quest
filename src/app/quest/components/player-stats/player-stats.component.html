<ion-card class="equipment-card">

  <!-- Character Header -->
  <div class="character-header">

    <ion-avatar class="equipment-avatar">
      <img
        src="../../../../assets/images/Knight.png"
        alt="Player Avatar" />
    </ion-avatar>

    <div class="character-info">

      <div class="character-name">
        Noob Knight
      </div>

      <div class="character-meta">
        ⭐ Level 3 • 🪙 200 Gold
      </div>

    </div>

  </div>


  <!-- Divider -->
  <div class="sheet-divider"></div>


  <!-- XP Section -->
  <div class="xp-row">

    <!-- Top Row -->
    <div class="xp-header">

      <span class="xp-label">
        EXPERIENCE
      </span>

      <span class="xp-levels">
        Lv.3 → Lv.4
      </span>

    </div>

    <!-- XP Bar -->
    <ion-progress-bar value="0.48" class="xp-bar">
    </ion-progress-bar>

    <!-- Bottom Row -->
    <div class="xp-footer">

      <span class="xp-text">
        240 / 500 XP
      </span>

    </div>

  </div>


  <!-- Divider -->
  <div class="sheet-divider"></div>


  <!-- Stats Section -->
  <ion-grid class="stat-sheet">

    <!-- Intelligence -->
    <ion-row class="stat-line">

      <ion-col>

        <div class="stat-row-flex">

          <span class="stat-left">
            <i class="fa-solid fa-brain stat-icon"></i>
            INTELLIGENCE
          </span>

          <span class="stat-dots"></span>

          <span class="stat-value intelligence">
            50
          </span>

        </div>

      </ion-col>

    </ion-row>


    <!-- Strength -->
    <ion-row class="stat-line">

      <ion-col>

        <div class="stat-row-flex">

          <span class="stat-left">
            <i class="fa-solid fa-dumbbell stat-icon"></i>
            STRENGTH
          </span>

          <span class="stat-dots"></span>

          <span class="stat-value strength">
            25
          </span>

        </div>

      </ion-col>

    </ion-row>


    <!-- Accuracy -->
    <ion-row class="stat-line">

      <ion-col>

        <div class="stat-row-flex">

          <span class="stat-left">
            <i class="fa-solid fa-bullseye stat-icon"></i>
            ACCURACY
          </span>

          <span class="stat-dots"></span>

          <span class="stat-value accuracy">
            100
          </span>

        </div>

      </ion-col>

    </ion-row>

  </ion-grid>

</ion-card>
