<app-header-toolbar [toolbarTitle]="'Rules'" [isDisplayPoint]="true" [totalPoints]="200" />

<ion-content color="secondary">
  <ion-accordion-group class="rules-accordion">
    @for(rule of rules; track rule.id){
      <ion-accordion class="rule-card">
        <div slot="header" class="rule-header">
          <div class="rule-title-block">
            <h2>{{ rule.title }}</h2>
          </div>

          <div class="reward-row" aria-label="Rule rewards">
            <span class="reward xp">⭐ {{ rule.price.xp }}</span>
            <span class="reward coins">🪙 {{ rule.price.coins }}</span>
          </div>

          <button
            class="delete-btn"
            type="button"
            aria-label="Delete rule"
            (click)="$event.stopPropagation()"
          >
            ✕
          </button>

          <ion-icon name="chevron-down-outline" class="chevron" aria-hidden="true"></ion-icon>
        </div>

        <div slot="content" class="rule-content">
          <p>{{ rule.description }}</p>

          <div class="actions">
            <button class="btn success" type="button">Done</button>
            <button class="btn fail" type="button">Missed</button>
          </div>
        </div>
      </ion-accordion>
    }
  </ion-accordion-group>
</ion-content>
