<ion-header>
  <ion-toolbar color="primary">

    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>
      {{toolbarTitle}}
    </ion-title>

    <ion-buttons slot="end" class="ion-margin">

      @if(isDisplayPoint) {
        <div class="total-points">
          <i class="fa-solid fa-coins"></i>
          {{totalPoints}}
        </div>
      }

    </ion-buttons>

  </ion-toolbar>
</ion-header>
